<!doctype html>
<html lang="en">
  <head>
    <!-- Basic -->
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/assets/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Website Title -->
    <title>Happy Way Travels – Sri Lanka Tours Company & Travel Experts</title>

    <!-- SEO Description -->
    <meta
      name="description"
      content="Happy Way Travels is a leading Sri Lanka tours company offering guided tours, hotel bookings, transport, and customized travel experiences across Sri Lanka."
    />

    <!-- Keywords for SEO -->
    <meta
      name="keywords"
      content="Sri Lanka tours company, Sri Lanka travel agency, Sri Lanka holidays, Sri Lanka tour packages, sightseeing tours Sri Lanka"
    />

    <!-- Author & Robots -->
    <meta name="author" content="Happy Way Travels" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://www.happywaytravels.com/" />

    <!-- Open Graph for Social Sharing -->
    <meta property="og:title" content="Happy Way Travels – Sri Lanka Tours Company & Travel Experts" />
    <meta
      property="og:description"
      content="Explore Sri Lanka with Happy Way Travels – guided tours, hotels, transport, and unforgettable travel experiences."
    />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Happy Way Travels" />
    <meta property="og:url" content="https://www.happywaytravels.com/" />
    <meta property="og:image" content="https://www.happywaytravels.com/assets/og-image.jpg" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Happy Way Travels – Sri Lanka Tours Company" />
    <meta
      name="twitter:description"
      content="Book your Sri Lanka tours, hotels, and transport with Happy Way Travels – your trusted travel experts."
    />
    <meta name="twitter:image" content="https://www.happywaytravels.com/assets/og-image.jpg" />

    <!-- Theme Color -->
    <meta name="theme-color" content="#065f46" />

    <!-- Structured Data (JSON-LD) for Google -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "TravelAgency",
        "name": "Happy Way Travels",
        "url": "https://www.happywaytravels.com/",
        "logo": "https://www.happywaytravels.com/assets/logo.png",
        "description": "Happy Way Travels is a leading Sri Lanka tours company offering guided tours, hotel bookings, transport, and customized travel experiences.",
        "sameAs": [
          "https://www.facebook.com/happywaytravels",
          "https://www.instagram.com/happywaytravels"
        ],
        "address": {
          "@type": "PostalAddress",
          "addressLocality": "Colombo",
          "addressCountry": "Sri Lanka"
        }
      }
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
