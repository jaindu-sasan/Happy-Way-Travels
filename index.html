<!doctype html>
<html lang="en">
  <head>
    <!-- Basic -->
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/assets/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Brand Title (GLOBAL) -->
    <title>Happy Way Travels | Sri Lanka Travel & Tour Experts</title>

    <!-- Global SEO Description -->
    <meta
      name="description"
      content="Happy Way Travels is a trusted Sri Lanka travel company offering tours, hotel bookings, transport and customized travel experiences."
    />

    <!-- Global Keywords -->
    <meta
      name="keywords"
      content="Sri Lanka travel agency, Sri Lanka tours, Sri Lanka holidays, travel company Sri Lanka"
    />

    <!-- Brand -->
    <meta name="author" content="Happy Way Travels" />

    <!-- Open Graph (GLOBAL) -->
    <meta property="og:title" content="Happy Way Travels" />
    <meta
      property="og:description"
      content="Explore Sri Lanka with Happy Way Travels – tours, transport, hotels and unforgettable experiences."
    />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Happy Way Travels" />

    <!-- Optional -->
    <!--
    <meta property="og:image" content="https://yourdomain.com/og-image.jpg" />
    <meta property="og:url" content="https://yourdomain.com" />
    -->

    <!-- Theme -->
    <meta name="theme-color" content="#065f46" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
